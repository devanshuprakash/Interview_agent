services:
  # ── Backend (Express + TypeScript) ─────────────────────────────────────────
  - type: web
    name: interviewiq-server
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: MONGODB_URL
        sync: false          # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false          # e.g. https://interviewiq-server.onrender.com/api/auth/google/callback
      - key: CLIENT_ORIGIN
        sync: false          # e.g. https://interviewiq.onrender.com

  # ── Frontend (React + Vite → static site) ──────────────────────────────────
  - type: web
    name: interviewiq-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # e.g. https://interviewiq-server.onrender.com
      - key: VITE_FIREBASE_APIKEY
        sync: false
      - key: VITE_RAZORPAY_KEY_ID
        sync: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-store
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
